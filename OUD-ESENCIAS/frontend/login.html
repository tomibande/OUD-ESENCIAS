<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Oud & Esencias</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-layout">
    <section class="auth-layout__panel-marca">
      <p class="auth-layout__marca">Oud <span>&amp; Esencias</span></p>

      <blockquote class="auth-layout__cita">
        <p>“Un perfume no se elige, se reconoce.”</p>
        <small>Tradición perfumista árabe</small>
      </blockquote>

      <a href="index.html" class="auth-layout__volver">← Volver al catálogo</a>
    </section>

    <section class="auth-layout__panel-formulario">
      <div class="auth-caja">
        <h1 class="auth-caja__titulo">Bienvenido de nuevo</h1>
        <p class="auth-caja__subtitulo">Ingresá para gestionar tu carrito, cupones e historial de pedidos.</p>

        <p class="mensaje-alerta" data-error hidden></p>

        <form data-form-login novalidate>
          <div class="campo">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="tu@correo.com">
          </div>
          <div class="campo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
          </div>

          <button type="submit" class="btn btn--dorado btn--ancho">Ingresar</button>
        </form>

        <p class="auth-caja__pie">¿Todavía no tenés cuenta? <a href="registro.html">Creá una acá</a></p>

        <div class="auth-caja__demo">
          <strong>Cuenta de administrador demo:</strong><br>
          admin@oudesencias.com / admin1234
        </div>
      </div>
    </section>
  </div>

  <div class="toasts" data-toasts></div>

  <script type="module" src="dist/app.js"></script>
  <script type="module" src="dist/auth.js"></script>
</body>
</html>
